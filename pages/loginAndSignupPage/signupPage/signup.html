<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>판다마켓 - 회원가입</title>
    <link
      rel="shortcut icon"
      href="../../../images/favicon.ico"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="../../../style.css" />
    <link rel="stylesheet" href="../loginAndSignup.style.css" />
  </head>
  <body>
    <main class="wrap">
      <div class="form-area">
        <div class="form-logo-area">
          <a href="../../../index.html">
            <img class="form-logo" src="../../../images/logo.png" alt="logo" />
          </a>
        </div>
        <form class="login-signup-form" id="signup-form">
          <label class="form-label">이메일</label>
          <div class="form-input-area">
            <input
              id="signup-email"
              class="form-input"
              type="email"
              placeholder="이메일을 입력해주세요"
            />
          </div>
          <label class="form-label">닉네임</label>
          <div class="form-input-area">
            <input
              id="signup-nickname"
              class="form-input"
              type="text"
              placeholder="닉네임을 입력해주세요"
            />
          </div>
          <label class="form-label">비밀번호</label>
          <div class="form-input-area">
            <input
              id="signup-password"
              class="form-input"
              type="password"
              style="width: 100%"
              placeholder="비밀번호를 입력해주세요"
            />
            <button type="button" class="button visibility-img">
              <img src="../../../images/visibility-icon.svg" alt="visibility" />
            </button>
          </div>
          <label class="form-label">비밀번호 확인</label>
          <div class="form-input-area">
            <input
              id="signup-checkPassword"
              class="form-input"
              type="password"
              style="width: 100%"
              placeholder="비밀번호를 다시 한 번 입력해주세요"
            />
            <button type="button" class="button visibility-img">
              <img src="../../../images/visibility-icon.svg" alt="visibility" />
            </button>
          </div>
          <button class="button form-btn" id="signup-btn" disabled>회원가입</button>
        </form>

        <div class="easy-login-area">
          <h3 class="easy-login-title">간편 로그인하기</h3>
          <ul class="easy-login-btns">
            <li>
              <a href="https://www.google.com/" class="google-btn-area"
                ><img src="../../../images/google.svg" alt="google"
              /></a>
            </li>
            <li>
              <a href="https://www.kakaocorp.com/page/" class="kakao-btn-area"
                ><img src="../../../images/kakaotalk.svg" alt="kakaotalk"
              /></a>
            </li>
          </ul>
        </div>

        <div class="hint-message-area">
          <span class="hint-message">판다마켓이 처음이신가요?</span>
          <a class="go-link" href="../loginPage/login.html">로그인</a>
        </div>
      </div>
    </main>

    <script type="module" src="./signup.js"></script>
  </body>
</html>
